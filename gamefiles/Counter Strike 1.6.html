                function InitLeaderboard() { console.warn("ConsumePurchase is not implemented"); }

        // Hata yakalama ile Unity baГ…Еёlatma iГ…Еёlemi
        try {
            const script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                StartUnityInstance = function () {
                    createUnityInstance(canvas, config, (progress) => {
                        spinner.style.display = "none";
                        progressBarEmpty.style.display = "";
                        progressBarFull.style.width = `${100 * progress}%`;
                    }).then((unityInstance) => {
                        myGameInstance = unityInstance;
                        loadingCover.style.display = "none";
                    }).catch((message) => {
                        console.error("Unity yГғВјkleme hatasГ„Вұ:", message);
                    });
                };
                StartUnityInstance();
            };
            document.body.appendChild(script);
        } catch (error) {
            console.error("BaГ…Еёlatma sГ„ВұrasГ„Вұnda hata:", error);
        }

        function InitGame() {
            try {
                console.log('Init Game Success');
                initGame = true;
                if (nowFullAdOpen === true && myGameInstance != null) {
                    myGameInstance.SendMessage('YandexGame', 'OpenFullAd');
                }
            } catch (error) {
                console.error("InitGame sГ„ВұrasГ„Вұnda hata:", error);
            }
        }

        // Hata oluГ…ЕёtuГ„Еёunda oyuna devam etmek iГғВ§in tГғВјm hatalarГ„Вұ global olarak yakalayan yapГ„Вұ
        window.addEventListener("unhandledrejection", function(event) {

</script>
